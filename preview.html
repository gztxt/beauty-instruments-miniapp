<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>采薇美容仪器 - 企业展示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #3D8B7A;
  --primary-light: #5DAF9A;
  --primary-dark: #2D6B5E;
  --accent: #E8A87C;
  --accent-light: #F0C4A0;
  --bg: #F7F8F5;
  --card-bg: #ffffff;
  --text: #2C3E2D;
  --text-light: #7A8A7A;
  --radius: 12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* 轮播 */
.swiper-wrap {
  position: sticky;
  top: 0;
  z-index: 99;
  overflow: hidden;
  background: #EEF1EC;
  margin: 0 16px;
  border-radius: 16px;
}

.swiper-wrap .swiper-dots {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 6px;
}
.banner {
  width: 100%;
  height: 180px;
  display: flex;
  transition: transform 0.5s ease;
}
.banner-slide {
  min-width: 100%;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
}
.banner-slide:nth-child(1) { background: linear-gradient(135deg, #3D8B7A, #5DAF9A); }
.banner-slide:nth-child(2) { background: linear-gradient(135deg, #2D6B5E, #4A9F8A); }
.banner-slide:nth-child(3) { background: linear-gradient(135deg, #4A9F8A, #6BBFAA); }
.banner-slide:nth-child(4) { background: linear-gradient(135deg, #3D8B7A, #7ACFBA); }
@keyframes breathe {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.12); }
}
.banner-slide { animation: breathe 4s ease-in-out infinite; }
.swiper-dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}
.swiper-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: all 0.3s;
}
.swiper-dot.active { width: 20px; border-radius: 4px; background: var(--accent); }

/* 通用 */
.container { padding: 0 16px; }
.section { margin-top: 16px; }
.section-header { text-align: center; margin-bottom: 16px; }
.section-title {
  font-size: 18px; font-weight: 700; color: var(--primary);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.section-divider {
  width: 36px; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 2px; margin: 0 auto 16px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

/* 公司简介 */
.company-intro { text-align: center; padding: 24px 16px; }
.intro-icon { font-size: 36px; color: var(--accent); margin-bottom: 8px; }
.intro-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
.intro-desc { font-size: 14px; color: var(--text-light); line-height: 1.8; }

/* 核心优势 */
.advantages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.advantage-item { text-align: center; padding: 20px 12px; cursor: pointer; transition: transform 0.25s ease; }
.advantage-item:active { transform: scale(0.96); }
.adv-icon { font-size: 32px; margin-bottom: 8px; display: inline-block; transition: filter 0.25s ease, transform 0.25s ease; }
.advantage-item:hover .adv-icon { filter: brightness(1.2); transform: scale(1.1); }
.advantage-item:active .adv-icon { filter: brightness(0.8); transform: scale(0.9); }
.adv-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
.adv-desc { font-size: 12px; color: var(--text-light); line-height: 1.6; }

/* 主打产品 */
.featured-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.featured-item { overflow: hidden; cursor: pointer; }
.featured-item:active { transform: scale(0.96); }
.featured-img {
  width: 100%; height: 100px;
  background: linear-gradient(135deg, #E8F0EC, #D0E8DD);
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; margin-bottom: 8px;
  font-size: 13px; color: var(--primary-light);
  transition: filter 0.25s ease;
}
.featured-item:hover .featured-img { filter: brightness(1.08); }
.featured-item:active .featured-img { filter: brightness(0.85); }
.featured-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; padding: 0 0 0 12px; }
.featured-model { font-size: 12px; color: var(--accent); padding: 0 0 12px 12px; }

/* ===== 快速数据行 ===== */
.quick-stats {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 20px 16px;
  background: var(--card-bg);
  margin: -20px 16px 0;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  position: relative;
  z-index: 5;
}
.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.stat-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.stat-label {
  font-size: 12px;
  color: var(--text-light);
  white-space: nowrap;
}
.stat-divider {
  width: 1px;
  height: 28px;
  background: #e0e8e4;
}

/* 品牌故事 */
.brand-story { text-align: center; position: relative; overflow: hidden; padding: 28px 20px; }
.brand-story::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.brand-story::after {
  content: '"'; position: absolute; top: 10px; right: 20px;
  font-size: 60px; color: rgba(232, 168, 124, 0.1);
  font-family: Georgia, serif; line-height: 1;
}
.story-badge { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
.story-badge-line { width: 24px; height: 1px; background: var(--accent); }
.story-badge-text { font-size: 11px; color: var(--accent); letter-spacing: 2px; }
.story-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 12px; letter-spacing: 1px; }
.story-desc { font-size: 14px; color: var(--text-light); line-height: 1.8; margin-bottom: 16px; }
.story-highlight { display: flex; flex-direction: column; gap: 6px; align-items: center; }
.hl-item { font-size: 13px; color: #555; }
.hl-icon { color: var(--accent); margin-right: 4px; }

/* ===== 底部 CTA ===== */
.cta-section {
  margin: 20px 16px;
  background: linear-gradient(135deg, #2D6B5E 0%, #3D8B7A 50%, #4A9F8A 100%);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.cta-bg-deco {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.cta-circle {
  position: absolute;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 1px solid rgba(201, 168, 76, 0.1);
  top: -70px;
  right: -50px;
}
.cta-content {
  position: relative;
  z-index: 2;
}
.cta-text { color: white; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.cta-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 18px; }
.btn-gold {
  background: var(--accent); color: white; border: none;
  padding: 10px 32px; border-radius: 24px; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 12px rgba(232, 168, 124, 0.35);
}
.btn-gold:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(232, 168, 124, 0.45); }

/* Tab Bar */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  border-top: 1px solid rgba(0,0,0,0.06);
  z-index: 100;
  max-width: 420px; margin: 0 auto;
  padding: 6px 0 env(safe-area-inset-bottom, 0);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px;
  font-size: 11px; color: #9AA6A0; cursor: pointer; transition: color 0.3s; position: relative;
}
.tab-item .tab-icon { display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
.tab-item:active .tab-icon { transform: scale(0.88); }
.tab-item.active { color: var(--primary); }
.tab-item.active .tab-icon::after {
  content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--primary);
}
.tab-label { font-weight: 500; }

/* 产品页 */
.products-banner {
  height: 140px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 20px; font-weight: 700; letter-spacing: 2px;
}
.tab-bar {
  display: flex; background: white; border-bottom: 1px solid #E5E8E5;
  position: sticky; top: 180px; z-index: 50;
  margin: 0 16px; border-radius: 12px 12px 0 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.tab-bar .tab-item {
  flex: 1; padding: 14px 4px; font-size: 13px; color: var(--text-light); text-align: center;
  border-bottom: 2px solid transparent; transition: all 0.3s;
  white-space: nowrap;
}
.tab-bar .tab-item.active {
  color: var(--primary); border-bottom-color: var(--accent); font-weight: 600;
}
.product-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding-top: 12px; }
.product-item { display: flex; gap: 12px; padding: 12px; cursor: pointer; transition: filter 0.25s ease; }
.product-item:hover .product-img { filter: brightness(1.08); }
.product-item:active .product-img { filter: brightness(0.85); }
.product-img {
  width: 100px; height: 100px; flex-shrink: 0;
  background: linear-gradient(135deg, #E8F0EC, #D0E8DD);
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 12px; color: var(--primary-light);
  transition: filter 0.25s ease;
}
.product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.product-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.product-model { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.product-desc { font-size: 12px; color: var(--text-light); line-height: 1.5; }

/* 关于页 */
.hero-section {
  height: 160px;
  background: linear-gradient(135deg, #2D6B5E, var(--primary));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 28px; font-weight: 700; letter-spacing: 4px;
}
.desc-title { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
.desc-text { font-size: 14px; color: var(--text-light); line-height: 1.8; margin-bottom: 10px; }
.desc-text:last-child { margin-bottom: 0; }

/* 时间线 */
.timeline { position: relative; padding-left: 20px; }
.timeline::before {
  content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
  width: 2px; background: #D0D8D0;
}
.timeline-item { position: relative; padding-bottom: 20px; }
.timeline-dot {
  position: absolute; left: -15px; top: 4px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg);
}
.timeline-dot.first { width: 16px; height: 16px; left: -17px; top: 2px; background: var(--primary); }
.tl-year { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.tl-desc { font-size: 13px; color: var(--text-light); line-height: 1.6; }

/* 认证 */
.certs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.cert-item { text-align: center; padding: 16px 8px; cursor: pointer; transition: transform 0.25s ease; }
.cert-item:active { transform: scale(0.96); }
.cert-img {
  width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 8px;
  background: linear-gradient(135deg, #E8F0EC, rgba(232, 168, 124, 0.2));
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--primary-light);
  transition: filter 0.25s ease;
}
.cert-item:hover .cert-img { filter: brightness(1.15); }
.cert-item:active .cert-img { filter: brightness(0.85); }
.cert-name { font-size: 12px; color: var(--text-light); }

/* 工厂实拍 */
.factory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.factory-item { cursor: pointer; transition: transform 0.25s ease; }
.factory-item:active { transform: scale(0.96); }
.factory-img {
  height: 120px;
  background: linear-gradient(135deg, #E8F0EC, #D0E8DD);
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; font-size: 13px; color: var(--primary-light);
  transition: filter 0.25s ease;
}
.factory-item:hover .factory-img { filter: brightness(1.08); }
.factory-item:active .factory-img { filter: brightness(0.85); }

/* 联系我们 */
.info-card { padding: 20px; }
.info-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.info-item:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: var(--text-light); margin-bottom: 4px; }
.info-value { font-size: 15px; color: var(--text); }
.action-btns { display: flex; gap: 12px; margin-top: 16px; }
.action-btn {
  flex: 1; padding: 12px; border: 1px solid var(--primary); border-radius: 8px;
  background: white; color: var(--primary); font-size: 14px;
  cursor: pointer; transition: background 0.3s;
}
.action-btn:hover { background: #EEF4F0; }

/* 表单 */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.form-input, .form-textarea {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; outline: none; transition: border-color 0.3s;
  box-sizing: border-box;
}
.form-input:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(61, 139, 122, 0.12); }
.form-textarea { height: 100px; resize: none; }
.char-count { display: block; text-align: right; font-size: 12px; color: #B0BAB4; margin-top: 4px; }
.submit-btn { width: 100%; margin-top: 8px; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 地图占位 */
.map-placeholder {
  height: 180px;
  background: linear-gradient(135deg, #E8F0EC, #D0E8DD);
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius); font-size: 16px; color: var(--primary-light);
}

/* 底部 */
.footer {
  text-align: center; padding: 20px; font-size: 12px; color: #B0BAB4;
}

/* 弹窗 */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: white; border-radius: var(--radius); padding: 24px;
  width: 300px; max-width: 90%;
}
.modal-title { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.modal-model { font-size: 12px; color: var(--accent); margin-bottom: 8px; }
.modal-desc { font-size: 14px; color: var(--text-light); line-height: 1.6; margin-bottom: 16px; }
.modal-close {
  width: 100%; padding: 10px; background: var(--primary); color: white;
  border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
}
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: white; padding: 10px 20px;
  border-radius: 8px; font-size: 14px; z-index: 300;
  display: none;
}
.toast.show { display: block; }
</style>
</head>

<!-- 页面容器 -->
<div id="app"></div>

<!-- 弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-model" id="modalModel"></div>
    <div class="modal-desc" id="modalDesc"></div>

// ================= 逻辑 =================
let currentPage = 0;
let thisTab = 0;
let swiperIdx = 0;
let swiperTimer = null;

function switchTab(idx) {
  currentPage = idx;
  render();
}

function switchProductTab(idx) {
  thisTab = idx;
  render();
}

function render() {
  const pages = [renderHome, renderProducts, renderAbout, renderContact];
  document.getElementById('app').innerHTML = pages[currentPage]();
  
  // 所有页面都启动轮播
  const bannerIds = ['banner','banner-products','banner-about','banner-contact'];
  const dotsIds = ['','dots-products','dots-about','dots-contact'];
  const slideCounts = [4, 3, 3, 3];
  
  if (currentPage < bannerIds.length) {
    startSwiper(bannerIds[currentPage], dotsIds[currentPage], slideCounts[currentPage]);
  }
  
  // 绑定文本输入
  if (currentPage === 3) {
    const msg = document.getElementById('formMsg');
    if (msg) msg.oninput = function() {
      document.getElementById('charCount').textContent = this.value.length + '/500';
    };
  }
  
  // 恢复 product tab
  if (currentPage === 1) {
    const tabs = document.getElementById('product-tabs');
    if (tabs && tabs.children[thisTab]) tabs.children[thisTab].classList.add('active');
  }
}

function startSwiper(bannerId, dotsId, slideCount) {
  clearInterval(swiperTimer);
  const banner = document.getElementById(bannerId);
  if (!banner) return;
  swiperIdx = 0;
  swiperTimer = setInterval(() => {
    swiperIdx = (swiperIdx + 1) % slideCount;
    banner.style.transform = `translateX(-${swiperIdx * 100}%)`;
    // 更新 dots
    if (dotsId) {
      document.querySelectorAll('#' + dotsId + ' .swiper-dot').forEach((d,i) => {
        d.classList.toggle('active', i === swiperIdx);
      });
    } else {
      document.querySelectorAll('.swiper-dot').forEach((d,i) => {
        d.classList.toggle('active', i === swiperIdx);
      });
    }
  }, 4000);
}

function showModal(name, model, desc) {
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalModel').textContent = '型号：' + model;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function submitForm() {
  const name = document.getElementById('formName')?.value || '';
  const phone = document.getElementById('formPhone')?.value || '';
  const msg = document.getElementById('formMsg')?.value || '';
  if (!name || !phone) {
    showToast('请填写姓名和电话');
    return;
  }
  showToast('留言已提交，我们将尽快与您联系！');
}
